<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <style>
        .project {
            display: flex;
            justify-content: center;
            align-items: center;
            height: auto;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            width: 90%;
            max-width: 700px;
            height: auto;
            margin: 50px auto;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .container h2 {
            text-align: center;
            color: #E9E4F0;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            font-size: 2rem;
            margin-bottom: 25px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .container input {
            width: 200px;
            flex: 1;
            padding: 14px 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            background-color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .container input:focus {
            outline: none;
        }
        .container input::placeholder {
            color:#ccc;
            font-style: italic;
            font-size: 0.9rem;
        }
        .container input:focus {
            border-color: #59C173;
        }
        .container input:focus::placeholder {
            color: #59C173;
        }
        .container input:hover {
            border-color: #59C173;
        }

        .container button {
            padding: 14px 30px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(to right, #F27121, #E94057, #8A2387);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            white-space: nowrap;
        }
        .container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        .container ol { 
            padding: 0;
            margin-top: 20px;
        }
        .container ol li {
            padding: 15px;
            border-radius: 15px;
            margin-top: 12px;
            color: white;
            background: rgba(255, 255, 255, 0.15);
            margin-left: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
        }
        .container ol li:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateX(5px);
        }
        .container ol li button {
            width: auto;
            padding: 8px 20px;
            margin-left: 10px;
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .container ol li button:hover {
            background: linear-gradient(to right, #ff4b2b, #ff416c);
        }
        hr{
            margin-top: 20px;
            border: none;
            height: 3px;
            width: 100%;
            background: linear-gradient(to right, #F27121, #E94057, #8A2387);
            border-radius: 10px;
        }


    </style>
</head>
<body>
<div class="project">

    <div class="container">
        <h2>My To Do List</h2>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Enter task...">
            <button onclick="addtaskbar()">Add</button>
        </div>
        <hr>
        <ol id="taskList"></ol>
    </div>
</div>
</body>
<script>
 function addtaskbar(){
  var input=document.getElementById("taskInput");
  var task=input.value;
  if(task === "") {
    alert("Please enter a task");
    return;
  }
  var li=document.createElement("li");
  li.innerText = task;
  var delbt=document.createElement("button");
  delbt.innerText = "Delete";
  delbt.addEventListener("click", function() {
    li.remove();
  });
  li.appendChild(delbt);
  document.getElementById("taskList").appendChild(li);
  input.value = "";
 }
</script>
   
</html>
