<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note App</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            font-family: Arial, sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
            color: #1f2937;
            background: linear-gradient(135deg, #eef2ff, #f0fdf4);
        }
        .app{
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 16px;
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.12);
        }
        h1{
            margin-bottom: 24px;
            color: #333;
            text-align: center;
        }
        .note-form{
            display: flex;
            gap: 10px;
        }
        .note-form input{
            flex: 1;
            min-width: 0;
            padding: 12px 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            color: #333;
        }
        
        .note-form input:focus{
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.15);
        }
        .note-form button{
            padding: 12px 22px;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .note-form button:hover{
            background-color: #45a049;
        }
        .note-container{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }
        .note{
            display: flex;
            min-width: 0;
            min-height: 130px;
            padding: 16px;
            flex-direction: column;
            justify-content: space-between;
            gap: 16px;
            border: 1px solid #fde68a;
            border-radius: 10px;
            background-color: #fffbeb;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        }
        .note p{
            line-height: 1.5;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }
        .note button{
            align-self: flex-end;
            padding: 7px 12px;
            background-color: #f44336;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .note button:hover{
            background-color: #d32f2f;
        }
        @media (max-width: 520px){
            body{
                padding: 20px 12px;
            }
            .app{
                padding: 22px 16px;
            }
            .note-form{
                flex-direction: column;
            }
            .note-form button{
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <h1>Note App</h1>
        <div class="note-form">
            <input type="text" id="note" maxlength="300" placeholder="Enter your note">
            <button type="button" id="addButton">Add Note</button>
        </div>
        <div class="note-container" aria-live="polite"></div>
    </main>
    <script>
        const noteInput = document.getElementById('note');
        const addButton = document.getElementById('addButton');
        const noteContainer = document.querySelector('.note-container');

        addButton.onclick = function() {
            const noteText = noteInput.value.trim();
            if (noteText === '') return;

            const newNote = document.createElement('div');
            newNote.className = 'note';
            newNote.innerHTML = '<p></p><button type="button">Delete</button>';

            newNote.querySelector('p').textContent = noteText;
            newNote.querySelector('button').onclick = function() {
                newNote.remove();
            };

            noteContainer.appendChild(newNote);
            noteInput.value = '';
            noteInput.focus();
        };
    </script>
</body>
</html>
