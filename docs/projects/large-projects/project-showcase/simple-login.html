<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 11 - Simple Login</title>
    <link rel="stylesheet" href="./simple-login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="project-layout-fixes.css">
    <link rel="stylesheet" href="project-navigation.css">
</head>
<body class="project-page project-11">
    <div class="login-card">
        <h1>Login</h1>
        <input name="email" type="email" aria-label="Email address" placeholder="Enter your email">
        <br>
        <input name="password" type="password" aria-label="Password" placeholder="Enter your password">
        <br>
        <label class="remember-me">
            <input type="checkbox"> Remember me
        </label>
        <br>
        <button>Login</button>
        <br>
        <a href="#">Forgot password?</a>
        <p>Don't have an account? <a href="#">Sign up</a></p>
    </div>

    <div class="social-login">
        <p>Or continue with:</p>
        <a href="#"><i class="fa-brands fa-google fa-2x"></i></a>
        <a href="#"><i class="fa-brands fa-github fa-2x"></i></a>
        <a href="#"><i class="fa-brands fa-apple fa-2x"></i></a>
    </div>

    <div class="security-info">
        <i class="fa-solid fa-lock"></i>
        <p>256-bit SSL encryption</p>
    </div>

    <footer>
        <p>&copy; 2024 Simple Login. Your security is our priority.</p>
        <div class="footer-links">
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Contact</a>
        </div>
    </footer>

    <nav class="project-switcher" aria-label="Project navigation">
        <a href="./user-login.html" class="project-switcher__link" aria-label="Previous project: Project 10">← Previous</a>
        <a href="./index.html" class="project-switcher__link project-switcher__link--home">All Projects</a>
        <a href="./website-design.html" class="project-switcher__link" aria-label="Next project: Project 12">Next →</a>
    </nav>
</body>
</html>
