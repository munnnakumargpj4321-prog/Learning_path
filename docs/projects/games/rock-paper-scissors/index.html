<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root{
            --bg-1: #eef3f8;
            --bg-2: #dfe7ef;
            --card: rgba(255, 255, 255, 0.88);
            --card-border: rgba(148, 163, 184, 0.18);
            --text: #1e293b;
            --muted: #475569;
            --accent: #3f6ea8;
            --accent-2: #64748b;
            --good: #4f8a7f;
            --warn: #b7791f;
            --danger: #b4534f;
            --shadow: 0 18px 45px rgba(51, 65, 85, 0.12);
        }
        body{
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top, rgba(63, 110, 168, 0.10), transparent 34%),
                radial-gradient(circle at bottom right, rgba(100, 116, 139, 0.08), transparent 30%),
                linear-gradient(160deg, var(--bg-1), var(--bg-2));
            color: var(--text);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }
        .project{
            width: min(100%, 720px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 18px;
            padding: clamp(24px, 4vw, 40px);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(247, 250, 252, 0.90));
            border: 1px solid var(--card-border);
            border-radius: 28px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);    
        }
        h1{
            font-size: clamp(2rem, 4vw, 3.25rem);
            line-height: 1.05;
            letter-spacing: -0.04em;
            text-align: center;
            color: var(--text);
            text-shadow: none;
        }
        #result, #computer, #player{
            text-align: center;
        }
        #result{
            font-size: clamp(1.25rem, 2.3vw, 1.75rem);
            color: var(--accent);
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(63, 110, 168, 0.08);
            border: 1px solid rgba(63, 110, 168, 0.12);
        }
        #computer, #player{
            font-size: clamp(1rem, 1.8vw, 1.2rem);
            color: var(--muted);
            font-weight: 600;
        }
        .content{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
            width: 100%;
            margin-top: 6px;
        }
        .btn{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            width: 100%;
            margin-top: 6px;
        }
        button{
            min-width: 120px;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.92);
            color: var(--text);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease;
            border: 1px solid rgba(148, 163, 184, 0.18);
            box-shadow: 0 10px 20px rgba(51, 65, 85, 0.08);
        }
        button:hover{
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(51, 65, 85, 0.14);
        }
        button:active{
            transform: translateY(0);
        }
        button:focus-visible{
            outline: 2px solid rgba(63, 110, 168, 0.35);
            outline-offset: 3px;
        }
        .rock{
            background: linear-gradient(135deg, #dbe7f2, #c6d4e3);
            border-color: rgba(100, 116, 139, 0.18);
        }
        .paper{
            background: linear-gradient(135deg, #dfe8df, #cdddcf);
            border-color: rgba(100, 116, 139, 0.18);
        }
        .seasor{
            background: linear-gradient(135deg, #e6e0d6, #d9d0c2);
            border-color: rgba(100, 116, 139, 0.18);
        }
        #play{
            background: linear-gradient(135deg, #6b8fb6, #587899);
            border-color: rgba(63, 110, 168, 0.22);
            color: #ffffff;
        }
        #reset{
            background: linear-gradient(135deg, #8c6f6b, #725a57);
            border-color: rgba(180, 83, 79, 0.18);
            color: #ffffff;
        }
        .content button.is-selected{
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 16px 30px rgba(51, 65, 85, 0.18);
            border-color: rgba(63, 110, 168, 0.35);
            color: #ffffff;
            filter: saturate(1.05);
        }
        .rock.is-selected{
            background: linear-gradient(135deg, #54779c, #35516d);
        }
        .paper.is-selected{
            background: linear-gradient(135deg, #4f8a7f, #356a60);
        }
        .seasor.is-selected{
            background: linear-gradient(135deg, #7c8a9b, #596879);
        }
        .content button,
        .btn button{
            min-height: 52px;
        }
        .content button{
            flex: 1 1 140px;
            max-width: 180px;
        }
        .btn button{
            flex: 1 1 150px;
            max-width: 220px;
        }
        @media (max-width: 640px){
            body{
                padding: 14px;
            }
            .project{
                border-radius: 22px;
                padding: 20px 16px;
                gap: 14px;
            }
            .content,
            .btn{
                gap: 10px;
            }
            .content button,
            .btn button{
                width: 100%;
                max-width: none;
                min-width: 0;
            }
            #result{
                width: 100%;
            }
        }
        
    </style>
</head>
<body>
    <div class="project">

        <h1>Rock Paper Scissors</h1>
        <h2 id="result">Result</h2>
        <div class="content">
            <button class="rock" data-type="rock">Rock</button>
            <button class="paper" data-type="paper">Paper</button>
            <button class="seasor" data-type="scissors">Scissors</button>
        </div>
        <h2 id="computer">Computer</h2>
        <h2 id="player">Player</h2>
        <div class="btn">
            <button id="play">Play</button>
            <button id="reset">Reset</button>
        </div>
    </div>
    <script>
        const rock = document.querySelector('.rock');
        const paper = document.querySelector('.paper');
        const play = document.querySelector('#play');
        const reset = document.querySelector('#reset');
        const computer = document.querySelector('#computer');
        const player = document.querySelector('#player');
        const result = document.querySelector('#result');
        const choiceButtons = document.querySelectorAll('.content button');

        let computerScoreCount = 0;
        let playerScoreCount = 0;
        let selectedChoice = rock.dataset.type;

        function setActiveChoice(button) {
            choiceButtons.forEach((choiceButton) => {
                choiceButton.classList.remove('is-selected');
            });
            button.classList.add('is-selected');
            selectedChoice = button.dataset.type;
        }

        function updateScoreboard(computerChoice = '', playerChoice = '') {
            computer.textContent = computerChoice
                ? `Computer: ${computerScoreCount} | Choice: ${computerChoice}`
                : `Computer: ${computerScoreCount}`;
            player.textContent = playerChoice
                ? `Player: ${playerScoreCount} | Choice: ${playerChoice}`
                : `Player: ${playerScoreCount}`;
        }

        choiceButtons.forEach((button) => {
            button.addEventListener('click', () => {
                setActiveChoice(button);
            });
        });

        setActiveChoice(rock);
        updateScoreboard();

        function computerPlay() {
            const choices = ['rock', 'paper', 'scissors'];
            const randomIndex = Math.floor(Math.random() * choices.length);
            return choices[randomIndex];
        }

        function playRound(playerSelection, computerSelection) {
            if (playerSelection === computerSelection) {
                result.textContent = 'Draw';
            } else if (
                (playerSelection === 'rock' && computerSelection === 'scissors') ||
                (playerSelection === 'paper' && computerSelection === 'rock') ||
                (playerSelection === 'scissors' && computerSelection === 'paper')
            ) {
                playerScoreCount++;
                result.textContent = 'You Win';
            } else {
                computerScoreCount++;
                result.textContent = 'You Lose';
            }

            updateScoreboard(computerSelection, playerSelection);
        }

        play.addEventListener('click', () => {
            const playerSelection = selectedChoice;
            const computerSelection = computerPlay();
            playRound(playerSelection, computerSelection);
        });

        reset.addEventListener('click', () => {
            computerScoreCount = 0;
            playerScoreCount = 0;
            result.textContent = 'Result';
            setActiveChoice(rock);
            updateScoreboard();
        });
    </script>
</body>
</html>
