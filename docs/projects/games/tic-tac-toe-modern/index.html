<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 18px;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #d9f2ff, #fff6db);
            color: #222;
        }

        h1 {
            font-size: clamp(2rem, 4vw, 3.5rem);
        }

        .status {
            min-height: 1.5em;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
        }

        .box {
            border: none;
            border-radius: 12px;
            background: #fff;
            color: #222;
            font-size: 3rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        .box:disabled {
            cursor: default;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #111827;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
        }

        .btn:hover {
            background: #374151;
        }
    </style>
</head>
<body>
    <h1>Tic-Tac-Toe</h1>
    <p class="status" aria-live="polite">Player X's turn</p>

    <div class="board" aria-label="Tic-Tac-Toe board">
        <button class="box" type="button"></button>
        <button class="box" type="button"></button>
        <button class="box" type="button"></button>
        <button class="box" type="button"></button>
        <button class="box" type="button"></button>
        <button class="box" type="button"></button>
        <button class="box" type="button"></button>
        <button class="box" type="button"></button>
        <button class="box" type="button"></button>
    </div>

    <button class="btn" type="button">Reset</button>

    <script>
        const boxes = document.querySelectorAll('.box');
        const statusText = document.querySelector('.status');
        const resetButton = document.querySelector('.btn');
        const winningCombos = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8],
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8],
            [0, 4, 8],
            [2, 4, 6]
        ];

        let currentPlayer = 'X';
        let gameActive = true;

        function getWinner() {
            for (const [a, b, c] of winningCombos) {
                const mark = boxes[a].textContent;

                if (mark && mark === boxes[b].textContent && mark === boxes[c].textContent) {
                    return mark;
                }
            }

            return null;
        }

        function endGame(message) {
            gameActive = false;
            statusText.textContent = message;
            boxes.forEach((box) => {
                box.disabled = true;
            });
        }

        function handleMove(event) {
            const box = event.currentTarget;

            if (!gameActive || box.textContent) {
                return;
            }

            box.textContent = currentPlayer;

            const winner = getWinner();
            if (winner) {
                endGame(`Player ${winner} wins!`);
                return;
            }

            const draw = [...boxes].every((item) => item.textContent);
            if (draw) {
                endGame("It's a draw!");
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            statusText.textContent = `Player ${currentPlayer}'s turn`;
        }

        function resetGame() {
            boxes.forEach((box) => {
                box.textContent = '';
                box.disabled = false;
            });

            currentPlayer = 'X';
            gameActive = true;
            statusText.textContent = "Player X's turn";
        }

        boxes.forEach((box) => box.addEventListener('click', handleMove));
        resetButton.addEventListener('click', resetGame);
    </script>
</body>
</html>
