<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #667eea;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .input-row {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        #number1, #number2 {
            width: 300px;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: #f8f9fa;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }
        #number1::placeholder, #number2::placeholder {
            color: #999;
        }
        .button-row {
            display: flex;
            flex-direction: row;
            gap: 12px;
            justify-content: center;
            align-items: center;
        }
        .click-btn {
            width: 70px;
            height: 70px;
            border: none;
            border-radius: 15px;       
            cursor: pointer;    
            transition: all 0.3s ease;
            font-size: 24px;
            display: flex;
            align-items: center;   
            justify-content: center;
            color: #333;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .click-btn:nth-child(1) {
            background:  #764ba2 ;
        }
        .click-btn:nth-child(2) {
            background:  #f5576c ;
        }
        .click-btn:nth-child(3) {
            background:  #00f2fe ;
        }
        .click-btn:nth-child(4) {
            background:  #38f9d7 ;
        }
        .click-btn:hover {
            transform:scale(0.9);
        }
        .click-btn:active {
            transform: scale(0.9);
        }
        #result {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #764ba2;
        }
        #reset {
            display: none;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #764ba2;
            cursor: pointer;
            padding: 20px 20px;
            border-radius: 10px;
            background: #f8f9fa;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            position: absolute;
            bottom: 110px;
            right: 720px;
        }
        #reset:hover {
            transform: scale(0.95);   
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="input-row">
            <input type="number" id="number1" placeholder="Enter first number">
            <input type="number" id="number2" placeholder="Enter second number">
        </div>
        <div class="button-row">
            <button class="click-btn"><i class="fa-solid fa-plus"></i></button>
            <button class="click-btn"><i class="fa-solid fa-minus"></i></button>
            <button class="click-btn"><i class="fa-solid fa-times"></i></button>
            <button class="click-btn"><i class="fa-solid fa-divide"></i></button>
        </div>    
        <div id="result">Result will be shown here</div>
    </div>
    <div id="reset">Reset</div>
    <script>
        const number1 = document.getElementById('number1');
        const number2 = document.getElementById('number2');
        const plusBtn = document.querySelector('.button-row .click-btn:nth-child(1)');
        const minusBtn = document.querySelector('.button-row .click-btn:nth-child(2)');
        const multiplyBtn = document.querySelector('.button-row .click-btn:nth-child(3)');
        const divideBtn = document.querySelector('.button-row .click-btn:nth-child(4)');
        const resultDiv = document.getElementById('result');
        const resetBtn = document.getElementById('reset');
        
        plusBtn.addEventListener('click', function() {
            const result = Number(number1.value) + Number(number2.value); 
            resultDiv.textContent = result;
        });
        
        minusBtn.addEventListener('click', function() {
            const result = Number(number1.value) - Number(number2.value);
            resultDiv.textContent = result;
        });
        
        multiplyBtn.addEventListener('click', function() {
          
            const result = Number(number1.value) * Number(number2.value);
            resultDiv.textContent = result;
        });
        
        divideBtn.addEventListener('click', function() {
            if (number1.value === '' || number2.value === '') {  
                alert('Please enter both numbers');
                return;
            }
            if (Number(number2.value) === 0) {
                alert('Cannot divide by zero');
                return;
            }
            const result = Number(number1.value) / Number(number2.value);
            resultDiv.textContent = result;
        });
        
        resetBtn.addEventListener('click', function() {
            number1.value = '';
            number2.value = '';
            resultDiv.textContent = 'Result will be shown here';
            number1.focus();
            resetBtn.style.display = 'none';
        });
        number2.addEventListener('input', function() {
            if (number1.value !== '' && number2.value !== '') {
                resetBtn.style.display = 'block';
            } else {
                resetBtn.style.display = 'none';
            }
        });
    </script>
</body>
</html>
